<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grafika Komputer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Aplikasi Grafika Komputer</h1>

    <div class="toolbar">

        <button id="lineBtn">Garis DDA</button>
        <button id="circleBtn">Lingkaran</button>
        <button id="ellipseBtn">Elips</button>

        <button id="translateBtn">Translasi</button>
        <button id="scaleBtn">Scaling</button>
        <button id="rotateBtn">Rotasi</button>
        <button id="animateBtn">Animasi</button>
        <button id="undoBtn">Undo</button>
        <button id="redoBtn">Redo</button>
        <input type="color" id="colorPicker" value="#000000">
        <button id="clearBtn">Clear</button>

    </div>

    <canvas id="canvas" width="900" height="500"></canvas>


    <h3>Dibuat Oleh Kelompok 6</h3>

    <script src="script.js"></script>

</body>
</html>
